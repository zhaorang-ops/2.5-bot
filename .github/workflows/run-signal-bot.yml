name: Test Schedule

# 每 1 分钟运行一次 + 支持手动运行
on:
  workflow_dispatch:
  schedule:
    - cron: "*/1 * * * *"

# 完全删除 concurrency，避免被杀
# concurrency 已删除

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Print time
        run: |
          echo "✅ 定时任务成功触发！"
          echo "当前时间（UTC）: $(date -u)"
          echo "当前时间（北京时间）: $(date -d '+8 hours' '+%Y-%m-%d %H:%M:%S')"
